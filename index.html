<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Submit Receipt — IIC</title>
  <link rel="stylesheet" href="/upload.css">
</head>
<body>
  <main class="card" id="card">
    <header class="card-head">
      <div class="brand">
        <div class="brand-mark">IIC</div>
        <div class="brand-text">
          <div class="brand-title">Receipt Upload</div>
          <div class="brand-sub">Secure submission</div>
        </div>
      </div>
    </header>

    <section class="meta" id="meta">
      <div class="meta-row"><span class="meta-label">Cardholder</span><span class="meta-value" id="m-cardholder">—</span></div>
      <div class="meta-row"><span class="meta-label">Vendor</span><span class="meta-value" id="m-vendor">—</span></div>
      <div class="meta-row"><span class="meta-label">Amount</span><span class="meta-value" id="m-amount">—</span></div>
      <div class="meta-row"><span class="meta-label">Date</span><span class="meta-value" id="m-date">—</span></div>
    </section>

    <section class="body" id="body">
      <div class="field">
        <label for="store">Store / location <span class="opt">(optional)</span></label>
        <input id="store" name="store" type="text" autocomplete="off" placeholder="e.g. Home Depot — Plano">
      </div>

      <div class="field">
        <label for="description">Description <span class="opt">(optional)</span></label>
        <textarea id="description" name="description" rows="2" placeholder="What was this for?"></textarea>
      </div>

      <div class="field">
        <label for="files">Receipt photo(s) or PDF</label>
        <input id="files" name="files" type="file" accept="image/*,application/pdf" multiple capture="environment">
        <div class="hint">You can attach up to 20 files. Max 25MB each.</div>
        <div class="file-list" id="file-list"></div>
      </div>

      <button id="submit-btn" class="primary" type="button">Submit receipt</button>
      <button id="fraud-btn" class="secondary" type="button">This charge isn't mine</button>

      <div id="status" class="status" hidden></div>
    </section>

    <section class="done" id="done" hidden>
      <div class="done-check">✓</div>
      <div class="done-title">Receipt submitted</div>
      <div class="done-sub">Thanks. You can close this page.</div>
    </section>

    <section class="error-page" id="error-page" hidden>
      <div class="err-title" id="err-title">Link expired or not found</div>
      <div class="err-sub" id="err-sub">This receipt link is missing required information. Please use the link from your reminder email.</div>
    </section>
  </main>

  <script src="/upload.js"></script>
</body>
</html>
